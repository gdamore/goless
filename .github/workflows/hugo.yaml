name: Build and deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        run: |
          set -euo pipefail
          archive="hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          checksums="hugo_${HUGO_VERSION}_checksums.txt"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${checksums}"
          expected_checksum="$(grep "  ${archive}\$" "${checksums}" | awk '{print $1}')"
          if [[ -z "${expected_checksum}" ]]; then
            echo "Failed to find checksum for ${archive} in ${checksums}" >&2
            exit 1
          fi
          actual_checksum="$(sha256sum "${archive}" | awk '{print $1}')"
          echo "Expected SHA256: ${expected_checksum}"
          echo "Actual SHA256:   ${actual_checksum}"
          if [[ "${actual_checksum}" != "${expected_checksum}" ]]; then
            echo "Checksum verification failed for ${archive}" >&2
            exit 1
          fi
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${archive}"
          rm "${archive}" "${checksums}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Build site
        working-directory: site
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
