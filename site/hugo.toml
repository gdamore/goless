baseURL = "https://example.org/"
languageCode = "en-us"
title = "goless"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "goless is a modern text viewer and embeddable pure-Go pager core for terminal applications."
  repoURL = "https://github.com/gdamore/goless"
  pkgURL = "https://pkg.go.dev/github.com/gdamore/goless"
  tagline = "Modern text viewer and pager core for terminal applications"
  hero = "A modern text viewer for the terminal, and a pager core for the apps built around it."
  intro = "goless is shaping up as both a capable standalone viewer and an embeddable pager: intuitive, secure, Unicode-aware, customizable, pure Go, and built for modern terminal presentation."
  previewLabel = "Documentation Preview"
  previewText = "This site is available early while the user manual and embedder guide are still being built out."
  lightLogo = "/assets/logos/goless-light-transparent.png"
  darkLogo = "/assets/logos/goless-dark-transparent.png"
  favicon = "/assets/logos/goless-favicon-transparent.png"

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    name = "User Manual"
    pageRef = "/user-manual"
    weight = 10
  [[menu.main]]
    name = "Developer Guide"
    pageRef = "/developer-guide"
    weight = 20
